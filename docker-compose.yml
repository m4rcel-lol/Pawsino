services:
  pawsino:
    build: .
    container_name: pawsino_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.stat('/app/main.py')"]
      interval: 60s
      timeout: 10s
      retries: 3
